name: Refresh stars

on:
  schedule:
    # 07:00 UTC daily (~midnight Pacific)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: |
          if [ -z "${{ secrets.DEPLOY_HOOK_URL }}" ]; then
            echo "DEPLOY_HOOK_URL secret not set — add the Cloudflare Pages deploy hook in repo settings."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
